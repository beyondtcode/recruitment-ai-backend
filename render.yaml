services:
  - type: web
    name: recruitment-ai-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: MONDAY_API_KEY
        sync: false
      - key: BATCH_SECRET
        sync: false
